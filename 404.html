<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · packet dropped</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #070b13;
      color: #d9e1ee;
      font-family: "Space Grotesk", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .mono { font-family: "JetBrains Mono", monospace; }
    .code {
      font-size: clamp(4rem, 14vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      background: linear-gradient(120deg, #5da9ff, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      line-height: 1.1;
    }
    h1 { font-size: 1.4rem; margin: 10px 0 14px; }
    .trace {
      font-size: 12.5px;
      color: #5d6878;
      line-height: 1.9;
      margin-bottom: 28px;
    }
    .trace b { color: #f87171; font-weight: 500; }
    a.btn {
      display: inline-block;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      font-weight: 600;
      padding: 13px 26px;
      border-radius: 10px;
      background: linear-gradient(120deg, #5da9ff, #34d399);
      color: #06090f;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <p class="code mono">404</p>
    <h1>Packet dropped.</h1>
    <p class="trace mono">
      traceroute to this-page (0.0.0.0), 64 hops max<br>
      1&nbsp;&nbsp;gateway&nbsp;&nbsp;1.04 ms<br>
      2&nbsp;&nbsp;cdn-edge&nbsp;&nbsp;8.31 ms<br>
      3&nbsp;&nbsp;<b>* * * request timed out</b><br>
      the route you traced does not exist. it may never have.
    </p>
    <a class="btn" href="/">retrace from hop 01</a>
  </main>
</body>
</html>
